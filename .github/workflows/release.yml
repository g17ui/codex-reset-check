name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .alfredworkflow
        run: |
          TAG="${{ github.ref_name }}"
          ARTIFACT="Codex-Reset-Check-${TAG}.alfredworkflow"
          cd workflow && zip -r "../${ARTIFACT}" .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: Codex-Reset-Check-*.alfredworkflow
          generate_release_notes: true
